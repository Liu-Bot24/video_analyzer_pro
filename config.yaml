# ============================================================
# 视频识别分析器专业版 (Video Analyzer Pro) 配置文件
# ============================================================

# [API 核心连接配置]
api:
  # 【多模型/多线程配置列表】
  # 列表中配置了几个模型，程序就会启动几个并发线程。
  # 如果某个模型 TPM 高，想给它分配2个线程，只需在此列表中将该配置写两遍。
  endpoints:
    - key: "YOUR_API_KEY_HERE"
      base_url: "https://api.siliconflow.cn/v1"
      model: "zai-org/GLM-4.6V"
    # 可以继续添加更多模型，例如：
    # - key: "ANOTHER_API_KEY_HERE"
    #   base_url: "https://api.siliconflow.cn/v1"
    #   model: "THUDM/GLM-4V"

  # 单次网络请求的超时上限（秒）。建议 180 以上，防止大图传输超时
  timeout: 180
  
  # 接口请求失败（如网络波动或限流）后的自动重试次数
  max_retries: 3
  
  # 生成采样温度 (0.0 - 1.0)。数值越低，模型输出越严谨、固定；识别任务建议 0.1-0.2
  temperature: 0.1
  
  # 允许模型生成的最大 Token 长度，需包含分类、标题和详细描述的内容空间
  max_tokens: 1536

# [视频预处理配置]
video:
  # 待扫描处理的原始视频存放目录 (Windows 路径直接粘贴即可)
  source_dir: 'C:/path/to/your/videos'
  
  # 【全自定义动态截帧阶梯列表】
  # 逻辑说明：程序会自动计算视频时长，并根据此处定义的阶梯决定提取多少帧。
  # 格式：- [时长上限(秒), 提取帧数]
  # 您可以根据视频库特点无限增加阶梯，程序会自动按时长从小到大排序匹配。
  dynamic_frames:
    - [10, 5]         # 10秒以内提取5帧
    - [60, 10]        # 1分钟以内提取10帧
    - [300, 15]       # 5分钟以内提取15帧
    - [1800, 25]      # 30分钟以内提取25帧
    - [3600, 40]      # 1小时以内提取40帧
    - [999999, 60]    # 超过1小时的兜底逻辑，提取60帧

  # 提取图片后的缩放上限（长边像素）。超过此值会等比缩小，以减小 API 传输负担
  max_dimension: 1024
  
  # 程序扫描并处理的视频文件后缀名白名单
  extensions: ['.mp4', '.avi', '.mov', '.mkv', '.webm', '.flv']
  
  # --- 重命名逻辑配置 ---
  # 是否启用自动重命名功能 (基于 AI 生成的短标题)
  auto_rename: false
  # 重命名时是否保留原文件名 (仅在 auto_rename 为 true 时生效)
  # true  -> 结果为: 短标题_原文件名.mp4
  # false -> 结果为: 短标题.mp4 (若标题重名，程序会自动加序号 _1, _2...)
  keep_original_name: true

# [分类审计定义与存储规则]
# 逻辑说明：
# 1. 程序会将这里的 Key (如 violence) 发给 AI 作为识别标签标识。
# 2. 当 AI 返回该 Key 时，程序会根据 path 字段将视频移动到对应文件夹。
# 3. desc 是给 AI 的详细判定准则，通过描述视觉特征引导 AI 准确分类。
categories:
  violence:
    # 识别结论为该类时，视频移动到的目标子目录（相对于 source_dir）
    path: 'nsfw/violence'
    # 给 AI 的判定标准：详细描述该分类包含的视觉特征
    desc: "肢体冲突、攻击性动作（挥拳、踢拽、持械）、人员制服、殴打、或交通事故引发的人身冲突。重点识别：物理撞击、压制行为、受害者痛苦表情。"
  
  sex:
    path: 'nsfw/sex'
    desc: "性行为、生殖器暴露、或高度亲密行为（如敏感部位抚摸、强暗示性体位）。"
  
  nude:
    path: 'nsfw/nude'
    desc: "大面积皮肤暴露、内衣或透视装、隐私部位轮廓展示、或以身体私密部位为核心的特写镜头。"
  
  nsfw:
    path: 'nsfw'
    desc: "导致生理不适的内容，如血腥伤口、手术细节、自残痕迹、恐怖怪异形象、或违法犯罪行为的过程记录。"
  
  safe:
    path: 'safe'
    desc: "正常的日常生活、自然风景、公共活动、办公教学、或明确的虚拟游戏/动画画面（即使包含游戏内特效打斗）。"

# [系统运行行为配置]
system:
  # 并发数。仅在未配置 api.endpoints 列表时生效。通常 2-4 较为安全。
  concurrency: 1
  
  # 最终识别结果汇总表的名称，存放在 source_dir 目录下
  csv_file: "analysis_results_pro.csv"
  
  # 运行过程中的详细操作日志文件名，存放在 source_dir 目录下
  log_file: "app.log"
  
  # 发送给 AI 的提示词骨架
  # {categories_list} 为占位符，程序运行时会自动填入上方 categories 里的 Key 和 desc
  prompt_template: |


    你是一位客观的视觉内容审计员。请分析视频序列帧并完成以下识别工作：
    
    1. 识别画面中的人物、动作、环境及物理互动关系。
    2. 将视觉特征与下方类别标准比对，选出最匹配的一项。
    
    输出格式（务必严格遵守，不要有任何前导词）：
    [Category: 分类名]
    [Title: 短标题]
    
    分类标准：
    {categories_list}
    
    短标题要求：
    15字以内的精准叙述性标题，概括视频核心事件。
    
    详细要求：
    在输出标签后，提供场景描述、动作细节（是否有攻击、暴露等）及判定依据。
    注意：区分现实冲突与游戏特效；真实的街头纠纷或肢体暴力均判定为 violence。直接从标签开始输出。


